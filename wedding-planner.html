<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Luxury Wedding Planner</title>\n    <link href=\"https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Inter:wght@400;700&display=swap\" rel=\"stylesheet\">\n    <style>\n        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }\n        .navbar { background: #f9f9f9; padding: 10px; display: flex; justify-content: space-between; }\n        .tab { padding: 15px; border: 1px solid #ccc; margin: 5px; cursor: pointer; }\n        .tab.active { background: #fff; border-bottom: none; }\n        .container { padding: 20px; }\n        .hidden { display: none; }\n        .settings { display: flex; justify-content: space-between; padding: 10px; }\n        .theme { margin-right: 15px; }\n        /* Add more styles for luxury aesthetic */\n    </style>\n    <script>\n        const weddingData = { weddingMode: 'Traditional', themeColor: 'Gold', currency: 'USD' };\n        const saveToLocalStorage = () => localStorage.setItem('weddingData', JSON.stringify(weddingData));\n        const loadFromLocalStorage = () => {\n            const data = JSON.parse(localStorage.getItem('weddingData'));\n            if (data) { weddingData.weddingMode = data.weddingMode; weddingData.themeColor = data.themeColor; weddingData.currency = data.currency; }\n        };\n        document.addEventListener('DOMContentLoaded', loadFromLocalStorage);\n    </script>\n</head>\n<body>\n    <div class=\"navbar\">\n        <div class=\"settings\">\n            <div class=\"theme\">Theme: <select id=\"themeSwitcher\">\n                <option value=\"Gold\">Gold</option>\n                <option value=\"Blush\">Blush</option>\n                <option value=\"Sage\">Sage</option>\n                <!-- Add all other themes -->\n            </select></div>\n            <div class=\"currency\">Currency: <select id=\"currencySelector\">\n                <option value=\"USD\">USD</option>\n                <option value=\"EUR\">EUR</option>\n                <!-- Add 10 currencies -->\n            </select></div>\n        </div>\n    </div>\n    <div class=\"container\">\n        <div class=\"tabs\">\n            <div class=\"tab active\" data-tab=\"dashboard\">Dashboard</div>\n            <div class=\"tab\" data-tab=\"budget\">Budget</div>\n            <!-- Add other tabs -->\n        </div>\n        <div id=\"dashboard\">\n            <h1>Wedding Dashboard</h1>\n            <!-- Dashboard content goes here -->\n        </div>\n        <div id=\"budget\" class=\"hidden\">\n            <h1>Budget Tracker</h1>\n            <!-- Budget Tracker content goes here -->\n        </div>\n        <!-- Add content for all tabs -->\n    </div>\n    <script>\n        document.querySelectorAll('.tab').forEach(tab => {\n            tab.addEventListener('click', () => {\n                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));\n                tab.classList.add('active');\n                document.querySelectorAll('.container > div').forEach(content => content.classList.add('hidden'));\n                document.getElementById(tab.getAttribute('data-tab')).classList.remove('hidden');\n            });\n        });\n    </script>\n</body>\n</html>\n
